<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebyu | Academic Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap');

        :root {
            /* Dark Theme (Default) */
            --bg-color: #0a0e17;
            --surface: rgba(20, 25, 40, 0.6);
            --surface-hover: rgba(30, 40, 60, 0.8);
            --border: rgba(6, 182, 212, 0.2);
            --accent-cyan: #06b6d4;
            --accent-purple: #a855f7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --modal-bg: rgba(10, 14, 23, 0.95);
        }

        body.light-theme {
            --bg-color: #f1f5f9;
            --surface: rgba(255, 255, 255, 0.7);
            --surface-hover: rgba(255, 255, 255, 1);
            --border: rgba(6, 182, 212, 0.4);
            --text-main: #0f172a;
            --text-muted: #475569;
            --modal-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
        }

        /* --- Navbar & Logo --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }

        .logo-svg {
            width: 45px;
            height: 45px;
            filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.4));
            transition: transform 0.3s ease;
        }

        .logo-container:hover .logo-svg {
            transform: scale(1.05);
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-controls {
            display: flex;
            gap: 1rem;
        }

        .btn-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-main);
            font-weight: 600;
        }

        .btn-toggle:hover {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        /* --- Layout & Transitions --- */
        main {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .breadcrumb {
            margin-bottom: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            gap: 0.5rem;
        }

        .breadcrumb span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb span:hover {
            color: var(--accent-cyan);
        }

        .view-section {
            display: none;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .view-section.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Cards & Lists --- */
        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent-cyan);
            transform: scaleY(0);
            transition: transform 0.3s ease;
            transform-origin: bottom;
        }

        .card:hover {
            transform: translateY(-5px);
            background: var(--surface-hover);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .card:hover::before {
            transform: scaleY(1);
        }

        /* --- Topics & Tags --- */
        .topic-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            transition: all 0.2s;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .topic-item:hover {
            border-color: var(--accent-purple);
            background: var(--surface-hover);
        }

        .topic-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
        }

        .icon-badge {
            width: 35px; height: 35px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .icon-doc { background: rgba(37, 99, 235, 0.2); color: #2563eb; }
        .icon-sheet { background: rgba(5, 150, 105, 0.2); color: #059669; }
        .icon-slide { background: rgba(220, 38, 38, 0.2); color: #dc2626; }
        .icon-link { background: rgba(147, 51, 234, 0.2); color: #9333ea; }

        body:not(.light-theme) .icon-doc { color: #60a5fa; }
        body:not(.light-theme) .icon-sheet { color: #34d399; }
        body:not(.light-theme) .icon-slide { color: #f87171; }
        body:not(.light-theme) .icon-link { color: #c084fc; }

        .tags-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .chip {
            background: rgba(168, 85, 247, 0.15);
            color: var(--accent-purple);
            border: 1px solid rgba(168, 85, 247, 0.4);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .btn-action {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            background: rgba(6, 182, 212, 0.1);
            color: var(--accent-cyan);
            border: 1px solid rgba(6, 182, 212, 0.3);
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-action:hover {
            background: var(--accent-cyan);
            color: #fff;
        }

        /* --- Admin Controls --- */
        .admin-panel {
            background: rgba(168, 85, 247, 0.05);
            border: 1px dashed var(--accent-purple);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: none;
        }

        .admin-panel.visible {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            animation: slideUp 0.3s ease;
        }

        input, select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            outline: none;
            flex: 1;
            min-width: 200px;
        }

        input:focus, select:focus {
            border-color: var(--accent-cyan);
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.8;
        }

        /* --- Login Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            background: var(--modal-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }

        .modal-content h2 { margin-bottom: 1.5rem; color: var(--accent-cyan); }
        .modal-content input { margin-bottom: 1rem; width: 100%; }
        .modal-content .btn-primary { width: 100%; margin-top: 1rem; }
        
        .close-modal {
            margin-top: 1rem;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="app.navigate('home')">
            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="gradPurple" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path d="M 12 70 C 25 70 40 55 50 75 C 60 55 75 70 88 70 L 88 35 C 75 35 60 20 50 40 C 40 20 25 35 12 35 Z" fill="none" stroke="url(#gradCyan)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="50" y1="40" x2="50" y2="75" stroke="url(#gradCyan)" stroke-width="6" stroke-linecap="round"/>
                <path d="M 25 55 L 45 35 L 60 50 L 90 15" fill="none" stroke="url(#gradPurple)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 70 15 L 90 15 L 90 35" fill="none" stroke="url(#gradPurple)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="25" cy="55" r="5" fill="#a855f7" />
            </svg>
            <span class="logo-text">REBYU</span>
        </div>
        <div class="nav-controls">
            <button class="btn-toggle" onclick="app.toggleTheme()">
                <span id="theme-icon">☀️</span>
            </button>
            <button class="btn-toggle" onclick="app.requestModeToggle()" id="mode-btn">
                <span>🎓</span> Student Mode
            </button>
        </div>
    </header>

    <main>
        <div class="breadcrumb" id="breadcrumb"></div>

        <div id="admin-add-term" class="admin-panel">
            <input type="text" id="new-term-name" placeholder="Enter Term/Session Name (e.g., 3rd Year - 1st Sem)">
            <button class="btn-primary" onclick="app.addTerm()">+ Create Term</button>
        </div>

        <div id="admin-add-course" class="admin-panel">
            <input type="text" id="new-course-name" placeholder="Enter Course Title (e.g., Network Engineering)">
            <button class="btn-primary" onclick="app.addCourse()">+ Add Course</button>
        </div>

        <div id="admin-add-topic" class="admin-panel">
            <input type="text" id="new-topic-title" placeholder="Topic Title">
            <select id="new-topic-type">
                <option value="doc">Document (.docx)</option>
                <option value="sheet">Spreadsheet (.xlsx)</option>
                <option value="slide">Presentation (.pptx)</option>
                <option value="link">External Link</option>
            </select>
            <input type="text" id="new-topic-url" placeholder="File URL">
            <input type="text" id="new-topic-tags" placeholder="Tags (comma separated, e.g., Midterm, Prefinal)">
            <button class="btn-primary" onclick="app.addTopic()">+ Upload Topic</button>
        </div>

        <div id="view-terms" class="view-section active">
            <div class="grid-list" id="terms-list"></div>
        </div>

        <div id="view-courses" class="view-section">
            <div class="grid-list" id="courses-list"></div>
        </div>

        <div id="view-topics" class="view-section">
            <div id="topics-list"></div>
        </div>
    </main>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content">
            <h2>Admin Login</h2>
            <input type="text" id="auth-user" placeholder="Username">
            <input type="password" id="auth-pass" placeholder="Password">
            <button class="btn-primary" onclick="app.login()">Login</button>
            <div class="close-modal" onclick="app.closeModal()">Cancel</div>
        </div>
    </div>

    <footer>
        powered by brenduling
    </footer>

    <script>
        const app = {
            mode: 'student', 
            theme: 'dark',
            data: [], // Starts with no values as requested
            currentLevel: 'home',
            activeTermId: null,
            activeCourseId: null,

            init() {
                this.renderBreadcrumb();
                this.renderTerms();
                this.updateUI();
            },

            toggleTheme() {
                this.theme = this.theme === 'dark' ? 'light' : 'dark';
                document.body.classList.toggle('light-theme');
                document.getElementById('theme-icon').textContent = this.theme === 'dark' ? '☀️' : '🌙';
            },

            requestModeToggle() {
                if (this.mode === 'student') {
                    document.getElementById('auth-modal').classList.add('active');
                } else {
                    this.setMode('student');
                }
            },

            closeModal() {
                document.getElementById('auth-modal').classList.remove('active');
                document.getElementById('auth-user').value = '';
                document.getElementById('auth-pass').value = '';
            },

            login() {
                const user = document.getElementById('auth-user').value;
                const pass = document.getElementById('auth-pass').value;
                if (user === 'brenduling' && pass === 'brenduling') {
                    this.closeModal();
                    this.setMode('admin');
                } else {
                    alert("Invalid credentials.");
                }
            },

            setMode(newMode) {
                this.mode = newMode;
                const btn = document.getElementById('mode-btn');
                
                if (this.mode === 'admin') {
                    btn.innerHTML = `<span>⚙️</span> Admin Mode`;
                    btn.style.borderColor = "var(--accent-purple)";
                } else {
                    btn.innerHTML = `<span>🎓</span> Student Mode`;
                    btn.style.borderColor = "var(--border)";
                }
                this.updateUI();
            },

            navigate(level, id = null) {
                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));

                setTimeout(() => {
                    if (level === 'home') {
                        this.currentLevel = 'home';
                        this.activeTermId = null;
                        this.activeCourseId = null;
                        this.renderTerms();
                        document.getElementById('view-terms').classList.add('active');
                    } else if (level === 'term') {
                        this.currentLevel = 'term';
                        this.activeTermId = id;
                        this.activeCourseId = null;
                        this.renderCourses();
                        document.getElementById('view-courses').classList.add('active');
                    } else if (level === 'course') {
                        this.currentLevel = 'course';
                        this.activeCourseId = id;
                        this.renderTopics();
                        document.getElementById('view-topics').classList.add('active');
                    }
                    this.renderBreadcrumb();
                    this.updateUI();
                }, 50);
            },

            updateUI() {
                document.getElementById('admin-add-term').classList.remove('visible');
                document.getElementById('admin-add-course').classList.remove('visible');
                document.getElementById('admin-add-topic').classList.remove('visible');

                if (this.mode === 'admin') {
                    if (this.currentLevel === 'home') document.getElementById('admin-add-term').classList.add('visible');
                    if (this.currentLevel === 'term') document.getElementById('admin-add-course').classList.add('visible');
                    if (this.currentLevel === 'course') document.getElementById('admin-add-topic').classList.add('visible');
                }
            },

            renderBreadcrumb() {
                const bc = document.getElementById('breadcrumb');
                let html = `<span onclick="app.navigate('home')">🏠 Home</span>`;
                
                if (this.activeTermId) {
                    const term = this.data.find(t => t.id === this.activeTermId);
                    if(term) html += ` / <span onclick="app.navigate('term', '${term.id}')">${term.name}</span>`;
                }
                if (this.activeCourseId) {
                    const term = this.data.find(t => t.id === this.activeTermId);
                    const course = term.courses.find(c => c.id === this.activeCourseId);
                    if(course) html += ` / <span>${course.name}</span>`;
                }
                bc.innerHTML = html;
            },

            renderTerms() {
                const container = document.getElementById('terms-list');
                if (this.data.length === 0) {
                    container.innerHTML = `<p style="color: var(--text-muted)">No terms or sessions available yet.</p>`;
                    return;
                }
                container.innerHTML = this.data.map(term => `
                    <div class="card" onclick="app.navigate('term', '${term.id}')">
                        <h3>${term.name}</h3>
                        <p>${term.courses.length} Courses</p>
                    </div>
                `).join('');
            },

            renderCourses() {
                const term = this.data.find(t => t.id === this.activeTermId);
                const container = document.getElementById('courses-list');
                if (!term || term.courses.length === 0) {
                    container.innerHTML = `<p style="color: var(--text-muted)">No courses available for this term yet.</p>`;
                    return;
                }
                container.innerHTML = term.courses.map(course => `
                    <div class="card" onclick="app.navigate('course', '${course.id}')">
                        <h3>${course.name}</h3>
                        <p>${course.topics.length} Materials Uploaded</p>
                    </div>
                `).join('');
            },

            renderTopics() {
                const term = this.data.find(t => t.id === this.activeTermId);
                const course = term.courses.find(c => c.id === this.activeCourseId);
                const container = document.getElementById('topics-list');
                
                if (!course || course.topics.length === 0) {
                    container.innerHTML = `<p style="color: var(--text-muted)">No topics or files uploaded yet.</p>`;
                    return;
                }

                container.innerHTML = course.topics.map(topic => {
                    let iconCls = '', iconTxt = '', actionTxt = 'Download';
                    switch(topic.type) {
                        case 'doc': iconCls = 'icon-doc'; iconTxt = 'DOC'; break;
                        case 'sheet': iconCls = 'icon-sheet'; iconTxt = 'XLS'; break;
                        case 'slide': iconCls = 'icon-slide'; iconTxt = 'PPT'; break;
                        case 'link': iconCls = 'icon-link'; iconTxt = '🔗'; actionTxt = 'Visit Link'; break;
                    }

                    const tagsHtml = topic.tags.map(tag => `<span class="chip">${tag}</span>`).join('');

                    return `
                        <div class="topic-item">
                            <div class="topic-info">
                                <div class="icon-badge ${iconCls}">${iconTxt}</div>
                                <div>
                                    <h3>${topic.title}</h3>
                                    <div class="tags-container">${tagsHtml}</div>
                                </div>
                            </div>
                            <a href="${topic.url}" target="_blank" class="btn-action">${actionTxt}</a>
                        </div>
                    `;
                }).join('');
            },

            generateId() { return '_' + Math.random().toString(36).substr(2, 9); },

            addTerm() {
                const input = document.getElementById('new-term-name');
                if(!input.value) return alert("Please enter a term name.");
                this.data.push({ id: this.generateId(), name: input.value, courses: [] });
                input.value = '';
                this.renderTerms();
            },

            addCourse() {
                const input = document.getElementById('new-course-name');
                if(!input.value) return alert("Please enter a course title.");
                const term = this.data.find(t => t.id === this.activeTermId);
                term.courses.push({ id: this.generateId(), name: input.value, topics: [] });
                input.value = '';
                this.renderCourses();
            },

            addTopic() {
                const title = document.getElementById('new-topic-title');
                const type = document.getElementById('new-topic-type');
                const url = document.getElementById('new-topic-url');
                const tagsInput = document.getElementById('new-topic-tags');
                
                if(!title.value || !url.value) return alert("Please fill out both the title and the file/link URL.");
                
                // Process tags: split by comma, trim whitespace, remove empties
                const tagsArray = tagsInput.value.split(',').map(t => t.trim()).filter(t => t.length > 0);
                
                const term = this.data.find(t => t.id === this.activeTermId);
                const course = term.courses.find(c => c.id === this.activeCourseId);
                
                course.topics.push({
                    id: this.generateId(),
                    title: title.value,
                    type: type.value,
                    url: url.value,
                    tags: tagsArray
                });
                
                title.value = '';
                url.value = '';
                tagsInput.value = '';
                this.renderTopics();
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
